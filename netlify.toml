[build]
  command = "NODE_OPTIONS='--max-old-space-size=4096' npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Astro hashed assets — cache forever
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, immutable"

# Static assets — medium cache
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, no-transform, max-age=2592000"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"