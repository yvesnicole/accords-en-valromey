app = "accords-en-valromey"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  [build.secrets]
    NEXT_PUBLIC_TINA_CLIENT_ID = "NEXT_PUBLIC_TINA_CLIENT_ID"
    TINA_TOKEN = "TINA_TOKEN"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
